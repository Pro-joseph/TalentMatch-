services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_network

  php:
    build: .
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/docker-php-ext-opcache.ini
    depends_on:
      - mysql
      - redis
    networks:
      - app_network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    networks:
      - app_network

  queue-worker:
    build: .
    image: talentmatch-php
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/docker-php-ext-opcache.ini
    depends_on:
      - mysql
      - redis
    networks:
      - app_network
    command: php artisan queue:work redis --queue=default --sleep=3 --tries=3

  reverb:
    build: .
    image: talentmatch-php
    ports:
      - "8081:8081"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - storage_data:/var/www/storage
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/docker-php-ext-opcache.ini
    depends_on:
      - mysql
      - redis
    networks:
      - app_network
    command: php artisan reverb:start --host=0.0.0.0 --port=8081

  phpmyadmin:   
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql   
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - app_network

volumes:
  mysql_data:
  vendor_data:
  storage_data:

networks:
  app_network:
    driver: bridge