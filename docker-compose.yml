services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_network

  php:
    build: .
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/fpm.conf:/usr/local/etc/php-fpm.d/custom.conf
    depends_on:
      - mysql
      - redis
    networks:
      - app_network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  queue-worker:
    build: .
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - mysql
      - redis
    networks:
      - app_network
    command: php artisan queue:work --queue=default --sleep=3 --tries=3 --max-time=0

  redis:
    image: redis:7-alpine
    networks:
      - app_network

  reverb:
    build: .
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - mysql
      - redis
    networks:
      - app_network
    ports:
      - "8081:8080"
    command: php artisan reverb:start --debug
    dns:
      - 127.0.0.11

  phpmyadmin:   
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql   
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - app_network

volumes:
  mysql_data:
  vendor_data:

networks:
  app_network:
    driver: bridge